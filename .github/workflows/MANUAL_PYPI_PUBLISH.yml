name: "Manual PyPI Publish"

on:
  workflow_dispatch:
    inputs:
      RELEASE_VERSION:
        required: true
        type: string
        description: "Release version to publish to PyPI"

permissions:
  contents: write

jobs:
  PYPI_PUBLISH:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install project dependencies
        run: |
          pip install ".[all]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        run: |
          cd flowyml_notebook/frontend
          npm install
          npm run build

      - name: Set version for publishing
        run: |
          echo "Setting package version to ${{ inputs.RELEASE_VERSION }}"
          sed -i "s/^version = .*/version = \"${{ inputs.RELEASE_VERSION }}\"/" pyproject.toml

      - name: Build and publish to PyPI
        id: publish_pypi
        run: |
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        continue-on-error: true

      - name: Retry PyPI publish on failure
        if: steps.publish_pypi.outcome == 'failure'
        run: |
          echo "First attempt failed, retrying..."
          sleep 10
          rm -rf dist
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
